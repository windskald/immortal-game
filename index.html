<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>道心化神：修仙模擬器</title>
</head>
<body>

<div id="spirit-flow"></div>

<input type="file" id="file-loader" style="display:none;" onchange="handleFileSelect(event)">

<div id="main-container">
    <button id="sys-toggle" onclick="toggleSettings()"></button>
    <div id="chat">
        <div id="manifesto-area" class="msg gm"></div>
        <div id="loading-indicator" style="display:none; padding-left:20px; color:#666;"></div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" onkeypress="if(event.key==='Enter')run()">
        <button id="send-btn" onclick="run()"></button>
    </div>
    <button id="scroll-btn" onclick="scrollToBottom()">▼</button>
</div>

<div id="settings-modal" onclick="if(event.target===this)toggleSettings()" style="display:none;">
    <div class="modal-content">
        <h2 id="ui-title"></h2>
        <select id="cfg-lang" onchange="changeLanguage(this.value)" style="width: 100%; margin-bottom: 15px;">
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
        </select>
        <select id="service-type" style="width: 100%; margin-bottom: 5px;">
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI (GPT)</option>
        </select>
        <div style="display:flex; gap:5px;">
            <input type="password" id="apiKey" style="flex:1">
            <button onclick="pasteKey()" id="ui-paste-btn">📋</button>
        </div>
        <div style="text-align: right; margin-bottom: 15px;">
            <a id="ui-get-key-link" href="#" target="_blank" style="color: #888; font-size: 0.8rem; text-decoration: underline;"></a>
        </div>
        <div style="font-size: 0.85rem; color: #888; margin-bottom: 5px;" id="ui-color-label"></div>
        <div class="setting-row" style="margin-bottom: 15px; display: flex; justify-content: space-around;">
            <input type="color" id="cfg-bg" value="#000000">
            <input type="color" id="cfg-sys" value="#cccccc">
            <input type="color" id="cfg-ply" value="#ffffff">
        </div>
        <div style="font-size: 0.85rem; color: #888; margin-bottom: 5px;" id="ui-font-label"></div>
        <select id="cfg-font" style="width: 100%; margin-bottom: 10px;">
            <option value="'標楷體', serif">古典標楷</option>
            <option value="'微軟正黑體', sans-serif">現代正黑</option>
        </select>
        <input type="range" id="cfg-size" min="0.8" max="2.0" step="0.1" value="1.15" style="width: 100%; margin-bottom: 20px;">
        <div class="btn-row" style="display:flex; flex-wrap:wrap; gap:10px;">
            <button onclick="exportHistory(false)" id="ui-export-full"></button>
            <button onclick="exportHistory(true)" id="ui-export-short"></button>
        </div>
        <button onclick="applyVisualSettings(); saveSettings();" id="ui-apply" style="width:100%; margin-top:20px; padding:12px;"></button>
    </div>
</div>

<script>
    let CAUSALITY_PROMPT = "", CHART_DICT = {}, FLOW_RULES = {}, MANIFESTO_DATA = {};
    let history = [], fullLog = []; 
    // 初始色設為更清透的 Ivory (255, 255, 240)
    let currentSpirit = { r: 255, g: 255, b: 240 };

    async function initGame() {
        try {
            const [caus, maniRes, stylRes, chartRes, flowRes] = await Promise.all([
                fetch('CAUSALITY').then(r => r.text()),
                fetch('MANIFESTO'),
                fetch('STYLING'),
                fetch('CHART'),
                fetch('FLOW')
            ]);
            const styleTag = document.createElement('style');
            styleTag.innerHTML = await stylRes.text();
            document.head.appendChild(styleTag);
            
            MANIFESTO_DATA = await maniRes.json();
            CHART_DICT = await chartRes.json();
            FLOW_RULES = await flowRes.json();
            CAUSALITY_PROMPT = caus; 
            
            const savedLang = localStorage.getItem('game_lang') || 'zh-TW';
            document.getElementById('cfg-lang').value = savedLang;
            changeLanguage(savedLang);
            loadSavedVisuals();
            resetSpiritFlow(); // 初始載入時回歸鵝黃
        } catch (e) { console.error("初始化失敗", e); }
    }

    // 安靜重置顏色的法陣
    function resetSpiritFlow() {
        currentSpirit = { r: 255, g: 255, b: 240 };
        updateSpiritUI();
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split(/\r?\n/);
            let newH = [], newF = [], curR = null, curT = "";
            lines.forEach(l => {
                const line = l.trim();
                if (line.includes("【玩家】")) {
                    if (curR) commit(newH, newF, curR, curT);
                    curR = "user"; curT = "";
                } else if (line.includes("【天道】")) {
                    if (curR) commit(newH, newF, curR, curT);
                    curR = "model"; curT = "";
                } else if (line && !line.startsWith("===") && !line.startsWith("【修仙")) {
                    curT += l + "\n";
                }
            });
            if (curR) commit(newH, newF, curR, curT);
            if (newH.length > 0) {
                history = newH; fullLog = newF; renderChatHistory();
                const ui = CHART_DICT[document.getElementById('cfg-lang').value].ui;
                appendMsg('gm', ui.load_success);
                await runResumeCall();
            } else {
                const ui = CHART_DICT[document.getElementById('cfg-lang').value].ui;
                alert(ui.load_fail);
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function commit(h, f, r, t) {
        const text = t.trim();
        if(!text) return;
        h.push({ role: r, text: text });
        f.push({ role: (r === "user" ? "玩家" : "天道"), text: text });
    }

    function renderChatHistory() {
        const chat = document.getElementById('chat');
        chat.innerHTML = "";
        chat.appendChild(document.getElementById('manifesto-area'));
        chat.appendChild(document.getElementById('loading-indicator'));
        fullLog.forEach(m => appendMsg(m.role === "玩家" ? "player" : "gm", m.text));
        scrollToBottom();
    }

    async function runResumeCall() {
        const key = document.getElementById('apiKey').value.trim();
        if (!key) return;
        document.getElementById('loading-indicator').style.display = 'block';
        try {
            const lang = document.getElementById('cfg-lang').value;
            const ui = CHART_DICT[lang].ui;
            const service = document.getElementById('service-type').value;
            const reply = (service === 'gemini') ? await callGemini(key, "(再續前塵)", ui.resume_req) : await callOpenAI(key, "(再續前塵)", ui.resume_req);
            appendMsg('gm', reply);
            history.push({role: 'user', text: "(續)"}, {role: 'model', text: reply});
            fullLog.push({ role: "天道", text: reply });
        } catch (e) { console.error(e); }
        finally { document.getElementById('loading-indicator').style.display = 'none'; scrollToBottom(); }
    }

    async function run() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const lang = document.getElementById('cfg-lang').value;
        const d = CHART_DICT[lang];

        // 轉生重啟：安靜地洗掉一切
        if (text === "轉生重啟" || text === "Reincarnation") {
            history = []; fullLog = [];
            resetSpiritFlow(); // 背景回歸鵝黃
            renderChatHistory();
            input.value = '';
            return;
        }

        if (text === d.ui.load_cmd || text === "再續前塵" || text === "Load Progress") {
            document.getElementById('file-loader').click();
            input.value = '';
            return;
        }

        const key = document.getElementById('apiKey').value.trim();
        if (!text || !key) return;

        appendMsg('player', text);
        fullLog.push({ role: "玩家", text: text });
        input.value = '';
        document.getElementById('loading-indicator').style.display='block';
        
        try {
            const langReq = (lang === 'zh-TW') ? "Please respond in Traditional Chinese." : "Please respond in English.";
            const service = document.getElementById('service-type').value;
            const reply = (service === 'gemini') ? await callGemini(key, text, langReq) : await callOpenAI(key, text, langReq);
            appendMsg('gm', reply);
            detectSpiritFlow(reply);
            history.push({role: 'user', text: text}, {role: 'model', text: reply});
            fullLog.push({ role: "天道", text: reply });
        } catch (e) { appendMsg('gm', (d.err.unknown || "Error: ") + e.message); }
        finally { document.getElementById('loading-indicator').style.display='none'; scrollToBottom(); }
    }

    function appendMsg(cls, txt) { 
        const chat = document.getElementById('chat');
        const d = document.createElement('div'); d.className = `msg ${cls}`; 
        if (txt.includes('```')) {
            const parts = txt.split('```');
            parts.forEach((part, index) => {
                if (index % 2 === 1) { 
                    const container = document.createElement('div'); container.className = 'code-container';
                    const pre = document.createElement('pre'); pre.innerText = part.trim();
                    const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.innerText = '📋 COPY';
                    btn.onclick = () => { navigator.clipboard.writeText(part.trim()).then(() => { btn.innerText = '✅ COPIED'; setTimeout(() => btn.innerText = '📋 COPY', 2000); }); };
                    container.appendChild(pre); container.appendChild(btn); d.appendChild(container);
                } else { const span = document.createElement('span'); span.innerText = part; d.appendChild(span); }
            });
        } else { const span = document.createElement('span'); span.innerText = txt; d.appendChild(span); }
        chat.insertBefore(d, document.getElementById('loading-indicator'));
    }

    async function callGemini(k, t, l) {
        const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`).then(r => r.json());
        const modelObj = listRes.models.find(m => m.supportedGenerationMethods.includes('generateContent'));
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelObj.name}:generateContent?key=${k}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: l + "\n" + CAUSALITY_PROMPT }] }, ...history.map(h => ({ role: h.role, parts: [{ text: h.text }] })), { role: "user", parts: [{ text: t }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    async function callOpenAI(key, text, langReq) {
        const res = await fetch(`https://api.openai.com/v1/chat/completions`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({ model: "gpt-4-turbo", messages: [{ role: "system", content: langReq + "\n" + CAUSALITY_PROMPT }, ...history.map(h => ({ role: h.role === 'model' ? 'assistant' : 'user', content: h.text })), { role: "user", content: text }] })
        });
        const data = await res.json(); return data.choices[0].message.content;
    }

    async function exportHistory(shortMode) {
        const lang = document.getElementById('cfg-lang').value;
        const ui = CHART_DICT[lang].ui;
        if (fullLog.length === 0) { alert(ui.save_no_data); return; }
        let finalContent = "";
        let defaultName = shortMode ? ui.def_short : ui.def_full;
        if (shortMode) {
            document.getElementById('loading-indicator').style.display = 'block';
            try {
                const key = document.getElementById('apiKey').value.trim();
                const service = document.getElementById('service-type').value;
                finalContent = (service === 'gemini') ? await callGemini(key, ui.summary_req, "System") : await callOpenAI(key, ui.summary_req, "System");
            } catch (e) { alert("Error: " + e.message); document.getElementById('loading-indicator').style.display = 'none'; return; }
            document.getElementById('loading-indicator').style.display = 'none';
        } else {
            fullLog.forEach(item => { finalContent += `【${item.role}】\n${item.text}\n\n`; });
        }
        const userInputName = prompt(ui.save_prompt, defaultName);
        if (userInputName === null) return;
        const fileName = userInputName.trim() || defaultName;
        const blob = new Blob([finalContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `${fileName}.txt`; a.click();
    }

    function changeLanguage(l) {
        const d = CHART_DICT[l]; if(!d) return;
        document.getElementById('sys-toggle').innerHTML = d.ui.sys_btn;
        document.getElementById('ui-title').innerText = d.ui.title;
        document.getElementById('ui-export-full').innerText = d.ui.export_full;
        document.getElementById('ui-export-short').innerText = d.ui.export_short;
        document.getElementById('ui-apply').innerText = d.ui.apply;
        document.getElementById('send-btn').innerText = d.ui.send;
        document.getElementById('userInput').placeholder = d.ui.input_placeholder;
        if(history.length === 0 && MANIFESTO_DATA[l]) document.getElementById('manifesto-area').innerText = MANIFESTO_DATA[l];
        localStorage.setItem('game_lang', l);
    }
    
    function detectSpiritFlow(text) {
        const bg = document.getElementById('spirit-flow');
        if (!bg || !FLOW_RULES) return;

        const shift = 25; // 提高靈敏度
        let changed = false;

        // 火、怒屬性：偏向赤紅
        if (FLOW_RULES.plus_r?.some(k => text.includes(k))) {
            currentSpirit.r += shift;
            currentSpirit.g -= (shift / 4);
            currentSpirit.b -= (shift / 4);
            changed = true;
        }
        // 冰、寒屬性：減少紅，增加藍
        if (FLOW_RULES.minus_r?.some(k => text.includes(k))) {
            currentSpirit.r -= shift;
            currentSpirit.b += (shift / 2);
            changed = true;
        }

        if (changed) {
            // 邊界保護：下限設為 160，確保背景永遠明亮不灰濁
            const limit = 160;
            currentSpirit.r = Math.max(limit, Math.min(255, currentSpirit.r));
            currentSpirit.g = Math.max(limit, Math.min(255, currentSpirit.g));
            currentSpirit.b = Math.max(limit, Math.min(255, currentSpirit.b));
            updateSpiritUI();
        }
    }

    function updateSpiritUI() {
        const bg = document.getElementById('spirit-flow');
        if (bg) {
            bg.style.backgroundColor = `rgb(${currentSpirit.r}, ${currentSpirit.g}, ${currentSpirit.b})`;
        }
    }

    function toggleSettings() { const m = document.getElementById('settings-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    function saveSettings() { localStorage.setItem('game_key_univ', document.getElementById('apiKey').value.trim()); toggleSettings(); }
    function applyVisualSettings() { 
        const root = document.documentElement;
        root.style.setProperty('--bg', document.getElementById('cfg-bg').value);
        root.style.setProperty('--sys', document.getElementById('cfg-sys').value);
        root.style.setProperty('--ply', document.getElementById('cfg-ply').value);
    }
    function loadSavedVisuals() {
        const saved = JSON.parse(localStorage.getItem('game_visuals'));
        if (saved) {
            document.getElementById('cfg-bg').value = saved.bg;
            document.getElementById('cfg-sys').value = saved.sys;
            document.getElementById('cfg-ply').value = saved.ply;
            applyVisualSettings();
        }
    }
    function scrollToBottom() { const c = document.getElementById('chat'); c.scrollTop = c.scrollHeight; }
    function pasteKey() { navigator.clipboard.readText().then(t => document.getElementById('apiKey').value = t); }
    window.onload = () => { document.getElementById('apiKey').value = localStorage.getItem('game_key_univ') || ''; initGame(); };
</script>
</body>
</html>
