<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>道心化神：修仙破境模擬器</title>

    <meta property="og:title" content="道心化神：極速修仙模擬器">
    <meta property="og:description" content="天道無常，唯心永恆。這是一場關於道心的淬鍊旅程，準備好面對您的金丹、元嬰與化神考驗了嗎？">
    <meta property="og:type" content="website">

    <style>
        :root { --bg: #000; --sys: #ccc; --ply: #fff; --fnt: "標楷體", "DFKai-SB", "BiauKai", serif; }
        * { font-family: var(--fnt) !important; box-sizing: border-box; }
        body { background: var(--bg); color: var(--sys); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #444; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .setting-item { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: #aaa; }
        #chat { flex: 1; overflow-y: auto; padding: 30px; line-height: 1.8; font-size: 1.3rem; }
        #input-area { padding: 20px; border-top: 1px solid #444; display: flex; gap: 10px; }
        input, select, button { background: #222; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; }
        button { cursor: pointer; background: #444; transition: 0.2s; }
        button:hover:not(:disabled) { background: #666; }
        .help-link { color: #4dabff; text-decoration: none; font-size: 0.85rem; }
        .msg { margin-bottom: 30px; white-space: pre-wrap; }
        .gm { border-left: 5px solid #555; padding-left: 20px; color: var(--sys); }
        .player { color: var(--ply); text-align: right; font-weight: bold; }
        .err { color: #ff9800; border: 1px dashed #ff9800; padding: 15px; background: rgba(255,152,0,0.1); }
        .scroll-btn { background: #3d2b1f; color: #d4a373; border: 1px solid #d4a373; font-weight: bold; }
        #loading-indicator { color: #888; font-size: 1.1rem; margin-top: 10px; display: none; padding-left: 20px; }
    </style>
</head>
<body>

<div id="header">
    <div class="setting-item">
        <select id="service-type" onchange="updateHelpLink()">
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI (GPT)</option>
        </select>
        <input type="password" id="apiKey" placeholder="在此輸入 Key" style="width:150px;">
        <a id="get-key-link" class="help-link" target="_blank" href="https://ai.google.dev/gemini-api/docs/api-key?hl=zh-tw">如何取得 API Key？</a>
    </div>
    <div class="setting-item">
        <span>背景</span><input type="color" id="cfg-bg" value="#000000" onchange="updateUI()">
        <span>系統</span><input type="color" id="cfg-sys" value="#cccccc" onchange="updateUI()">
        <span>玩家</span><input type="color" id="cfg-ply" value="#ffffff" onchange="updateUI()">
    </div>
    <div class="setting-item">
        <button onclick="saveSettings()">💾 儲存設定</button>
        <button class="scroll-btn" onclick="exportHistory()">📜 儲存履歷</button>
        <input type="file" id="fileLoader" style="display:none" accept=".txt" onchange="importHistory(event)">
    </div>
</div>

<div id="chat">
    <div class="msg gm">天道不仁，唯道心可破。此處靈壓凝聚，萬事俱備。

請確認法門金鑰（API Key）已歸位。

心念起時，造化自生。

重塑肉身，請輸入：『轉生重啟』。
續接斷章，請輸入：『再續前塵』。</div>
    <div id="loading-indicator"></div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="在此輸入指令或回應..." style="flex:1" onkeypress="if(event.key==='Enter' && !this.disabled)run()">
    <button id="send-btn" onclick="run()">發送</button>
</div>

<script>
    const PROMPT = `你是一位專業遊戲主持。
【語系規範】必須完全使用「繁體中文」進行回覆（台灣慣用語）。
【主持核心規則】
1.在文字冒險遊戲中，若玩家沒有要求繼續遊戲，嚴禁在設定階段或局外討論時擅自推動劇情。
2.請嚴格遵守資訊對等原則，不要透漏角色不該知道的資訊。遇到模糊地帶時，請先暫停遊戲並以局外討論方式徵詢我的意見，且過程中不得透漏劇情細節。
3.詢問行動時保持開放式，除非要求否則不提供選項，禁止替玩家決定行動，也禁止事先告知玩家行動的是否為必然或非必然成功。
4.若行動與角色當下人設嚴重不符，請暫停並與我討論確認。
5.玩家採取的行動，必然成功則推進；非必然成功則以文字描述風險，徵詢玩家是否堅持。
6.堅持執行非必然成功時執行幕後 D100 判定，並根據數值差距給予分級的獎勵或懲罰，純敘事呈現。
7.主持時需預設章節大綱與 NPC 動機，確保劇情有嚴謹的前因後果，而非隨機發散。
8.新章節前自動複習先前劇情，確保世界觀、故事劇情與 NPC 邏輯連貫。
【遊戲核心架構】
1.此為遊戲冒險遊戲，需遵守主持文字冒險遊戲時的規則的專屬指令。
2.遊戲分為三個階段：金丹成形、元嬰現世、化神。
3.每個階段由三至七個不等的主要情境問題構成。
4.視玩家回應細節，每個主要情境問題你可以自由的追加數量不等的衍生情境問題。
5.這些問題相當於玩家修煉已滿，在進行破境時的道心問答。
6.第一階段結束時，告知玩家修煉出怎樣的金丹。
7.第二階段結束時，告知玩家修煉出怎樣的元嬰。
8.第三階段結束時，告知玩家成為怎樣的神。
9.如果玩家回應的一致性落差過大，則視為道心不穩，階段結束時機率性破境失敗。
10.關於「道心不穩」的判定基準，以敘事方式給予玩家警示，但累積到階段結束時才進行破境成功與否的判定。
11.衍生情境問題的觸發和回答，也會影響破境評價。
12.一旦破境失敗觸發轉世，以情節描述的方式小結玩家道心如何動搖造成破境失敗，接著進度重來，相當於開啟新遊戲。
13.如果玩家破境成功，小結玩家各階段狀態，並給予一個遙遠未來的凡人如何看待這位神、關於這位神有什麼傳說的後日談。
14.由於是道心問答的風格，而非主角實際遭遇的劇情故事，沒有特殊要求時，以一個「平均大眾的修仙世界」為背景世界觀即可。`;
    let history = [];
    let loadingInterval = null;

    function exportHistory() {
        if (history.length === 0) { alert("尚無修煉紀錄。"); return; }
        let content = history.map(h => `${h.role === 'user' ? '【道友】' : '【天道】'}: ${h.text}`).join('\n\n');
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `修仙履歷_${new Date().getTime()}.txt`;
        a.click();
    }

    function importHistory(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n\n');
            history = lines.map(line => {
                if (line.startsWith('【道友】: ')) return { role: 'user', text: line.replace('【道友】: ', '') };
                if (line.startsWith('【天道】: ')) return { role: 'model', text: line.replace('【天道】: ', '') };
            }).filter(h => h);
            appendMsg('gm', "【系統】前塵憶起，因果已重新連接。");
        };
        reader.readAsText(file);
    }

    function startLoading() {
        const loader = document.getElementById('loading-indicator');
        const chars = ["│", "／", "─", "＼"];
        let i = 0; loader.style.display = 'block';
        loadingInterval = setInterval(() => {
            loader.innerText = "【天機推演中 " + chars[i] + " 】";
            i = (i + 1) % chars.length;
        }, 150);
        document.getElementById('send-btn').disabled = true;
    }

    function stopLoading() {
        clearInterval(loadingInterval);
        document.getElementById('loading-indicator').style.display = 'none';
        document.getElementById('send-btn').disabled = false;
        document.getElementById('userInput').focus();
    }

    window.onload = () => {
        document.getElementById('apiKey').value = localStorage.getItem('game_key_univ') || '';
        updateUI();
    };

    function updateUI() {
        const root = document.documentElement;
        root.style.setProperty('--bg', document.getElementById('cfg-bg').value);
        root.style.setProperty('--sys', document.getElementById('cfg-sys').value);
        root.style.setProperty('--ply', document.getElementById('cfg-ply').value);
    }

    function saveSettings() {
        localStorage.setItem('game_key_univ', document.getElementById('apiKey').value.trim());
        alert('設定已儲存。');
    }

    async function run() {
        const out = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const service = document.getElementById('service-type').value;
        const key = document.getElementById('apiKey').value.trim();
        let text = input.value.trim();

        if(!text) return;

        // --- 優化：轉生重啟直接觸發新遊戲 ---
        if (text === "轉生重啟") {
            history = []; // 斬斷舊因果
            appendMsg('player', text);
            text = "開始遊戲"; // 自動轉換指令
        } else if (text === "再續前塵") {
            document.getElementById('fileLoader').click();
            input.value = '';
            return;
        } else {
            appendMsg('player', text);
        }
        
        if(!key) { alert("請先輸入金鑰（API Key）"); return; }
        input.value = '';
        startLoading();

        try {
            let reply = (service === 'gemini') ? await callGemini(key, text) : await callOpenAI(key, text);
            history.push({ role: "user", text: text });
            history.push({ role: "model", text: reply });
            appendMsg('gm', reply);
        } catch (e) {
            appendMsg('err', "【天機阻塞】" + e.message);
        } finally {
            stopLoading();
        }
        out.scrollTop = out.scrollHeight;
    }

    async function callGemini(key, text) {
        const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        const listData = await listRes.json();
        const model = listData.models.find(m => m.supportedGenerationMethods.includes('generateContent')).name;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
            method: 'POST',
            body: JSON.stringify({
                contents: [
                    { role: "user", parts: [{ text: PROMPT }] },
                    ...history.map(h => ({ role: h.role, parts: [{ text: h.text }] })),
                    { role: "user", parts: [{ text: text === "開始遊戲" ? "開始" : text }] }
                ]
            })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    async function callOpenAI(key, text) {
        const res = await fetch(`https://api.openai.com/v1/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({
                model: "gpt-4-turbo",
                messages: [
                    { role: "system", content: PROMPT },
                    ...history.map(h => ({ role: h.role === 'model' ? 'assistant' : 'user', content: h.text })),
                    { role: "user", content: text === "開始遊戲" ? "開始" : text }
                ]
            })
        });
        const data = await res.json();
        return data.choices[0].message.content;
    }

    function appendMsg(cls, txt) {
        const d = document.createElement('div');
        d.className = `msg ${cls}`; d.innerText = txt;
        document.getElementById('chat').insertBefore(d, document.getElementById('loading-indicator'));
    }
</script>
</body>
</html>
