<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>極速修仙：終極相容版</title>
    <style>
        body { background: #000; color: #fff; font-family: "標楷體", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 10px; background: #111; border-bottom: 1px solid #444; display: flex; gap: 10px; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; line-height: 1.8; font-size: 1.2rem; }
        #input-area { padding: 20px; border-top: 1px solid #444; display: flex; gap: 10px; }
        input { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; flex: 1; color: white; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; }
        .msg { margin-bottom: 20px; white-space: pre-wrap; }
        .gm { border-left: 4px solid #888; padding-left: 15px; }
        .player { color: #4dabff; text-align: right; font-weight: bold; }
        .err { color: #ff9800; border: 1px dashed #ff9800; padding: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="header">
    <input type="password" id="apiKey" placeholder="在此輸入 API Key" style="width:250px;">
    <button onclick="save()">儲存設定</button>
</div>

<div id="chat"><div class="msg gm">【系統】正在準備連結 AI 服務...
請儲存 Key 後輸入「開始遊戲」，系統將自動尋找您帳號可用的模型。</div></div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="在此輸入..." onkeypress="if(event.key==='Enter')run()">
    <button onclick="run()">發送</button>
</div>

<script>
    // 匯入規則
    const PROMPT = "你是一位專業遊戲主持。
【語系規範】必須完全使用「繁體中文」進行回覆（台灣慣用語）。
【主持核心規則】
1.在文字冒險遊戲中，若玩家沒有要求繼續遊戲，嚴禁在設定階段或局外討論時擅自推動劇情。
2.請嚴格遵守資訊對等原則，不要透漏角色不該知道的資訊。遇到模糊地帶時，請先暫停遊戲並以局外討論方式徵詢我的意見，且過程中不得透漏劇情細節。
3.詢問行動時保持開放式，除非要求否則不提供選項，禁止替玩家決定行動，也禁止事先告知玩家行動的是否為必然或非必然成功。
4.若行動與角色當下人設嚴重不符，請暫停並與我討論確認。
5.玩家採取的行動，必然成功則推進；非必然成功則以文字描述風險，徵詢玩家是否堅持。
6.堅持執行非必然成功時執行幕後 D100 判定，並根據數值差距給予分級的獎勵或懲罰，純敘事呈現。
7.主持時需預設章節大綱與 NPC 動機，確保劇情有嚴謹的前因後果，而非隨機發散。
8.新章節前自動複習先前劇情，確保世界觀、故事劇情與 NPC 邏輯連貫。
【遊戲核心架構】
1.此為遊戲冒險遊戲，需遵守主持文字冒險遊戲時的規則的專屬指令。
2.遊戲分為三個階段：金丹成形、元嬰現世、化神。
3.每個階段由三至七個不等的主要情境問題構成。
4.視玩家回應細節，每個主要情境問題你可以自由的追加數量不等的衍生問題。
5.這些問題相當於玩家修煉已滿，在進行破境時的道心問答。
6.第一階段結束時，告知玩家修煉出怎樣的金丹。
7.第二階段結束時，告知玩家修煉出怎樣的元嬰。
8.第三階段結束時，告知玩家成為怎樣的神。
9.如果玩家回應的一致性落差過大，則視為道心不穩，階段結束時機率性破境失敗。
10.關於「道心不穩」的判定基準，以敘事方式給予玩家警示，但累積到階段結束時才進行破境成功與否的判定。
11.衍生問題的觸發和回答，也會影響破境評價。
12.一旦破境失敗觸發轉世，以情節描述的方式小結玩家道心如何動搖造成破境失敗，接著進度重來，相當於開啟新遊戲。
13.如果玩家破境成功，小結玩家各階段狀態，並給予一個遙遠未來的凡人如何看待這位神、關於這位神有什麼傳說的後日談。
14.由於是道心問答的風格，而非主角實際遭遇的劇情故事，沒有特殊要求時，以一個「平均大眾的修仙世界」為背景世界觀即可。";

    function save() {
        localStorage.setItem('final_detect_key', document.getElementById('apiKey').value.trim());
        alert('Key 已儲存！');
    }

    window.onload = () => { document.getElementById('apiKey').value = localStorage.getItem('final_detect_key') || ''; };

    async function run() {
        const out = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const key = document.getElementById('apiKey').value.trim();
        const text = input.value.trim();

        if(!text || !key) return;
        appendMsg('player', text);
        input.value = '';

        try {
            // 第一步：自動獲取可用模型清單
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
            const listRes = await fetch(listUrl);
            const listData = await listRes.json();
            
            // 找出支援 generateContent 的第一個模型
            const availableModel = listData.models.find(m => m.supportedGenerationMethods.includes('generateContent'));
            
            if (!availableModel) throw new Error("您的 Key 找不到任何支援對話的模型。");

            // 第二步：使用自動找到的模型發送請求
            const url = `https://generativelanguage.googleapis.com/v1beta/${availableModel.name}:generateContent?key=${key}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT + "\n玩家：" + text }] }] })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            
            appendMsg('gm', data.candidates[0].content.parts[0].text);

        } catch (e) {
            appendMsg('err', "【連線失敗】" + e.message + "\n請確認 API Key 是否正確且已啟用。");
        }
        out.scrollTop = out.scrollHeight;
    }

    function appendMsg(cls, txt) {
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        d.innerText = txt;
        document.getElementById('chat').appendChild(d);
    }
</script>
</body>
</html>
